version: 2

project_name: commitly

before:
  hooks:
    - go mod tidy

builds:
  - id: cly
    binary: cly
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/pocikode/commitly/internal/version.Version={{.Version}}
      - -X github.com/pocikode/commitly/internal/version.Commit={{.ShortCommit}}
      - -X github.com/pocikode/commitly/internal/version.Date={{.Date}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Homebrew tap is optional. Uncomment and configure a tap repo to
